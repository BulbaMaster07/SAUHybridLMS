<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAU LMS Login</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>
<header class="header">
    <div class="header-container">
        <div class="brand">
            <img src="South_Aisan_University_Logo.png" alt="SAU">
            <span class="brand-text">SAU LMS</span>
        </div>
        <nav>
            <ul>
                <li class="active"><a href="homepage.html">Home</a></li>
                <li>Help</li>
            </ul>
        </nav>
    </div>
</header>

<div class="main-container">
    <div class="left-panel">
        <div class="image-wrapper">
            <img src="South_Aisan_University_Logo.png" alt="SAU Logo">
        </div>
    </div>
    <div class="right-panel">
        <div class="login-box">
            <div class="mobile-login-logo">
                <img src="sau-white-logo.png" alt="SAU Logo">
            </div>
            <h3>Login to SAU LMS</h3>
            <form>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Student Email</label>
                    <input type="email" placeholder="example@sau.ac.in">
                </div>
                <button class="btn">Login</button>
            </form>
            <div class="alt-login">
                <p>Or authenticate via</p>
                <div class="social">
                    <button>
                        <img src="./google-icon.svg">
                        Google
                    </button>
                    <button>
                        <img src="./ms-icon.jpg">
                        Microsoft
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
<footer class="footer">
    <div class="footer-container">

        <div class="footer-left">
            <h4>South Asian University</h4>
            <p>Learning Management System</p>
        </div>
        <div class="footer-links">
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Privacy</a>
        </div>
    </div>
    <div class="footer-bottom">
        © 2026 SAU
    </div>
</footer>
</body>
</html>
